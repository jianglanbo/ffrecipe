backend:
  name: github
  repo: jianglanbo/ffrecipe
  branch: main
  base_url: https://www.ffrecipe.com
  auth_endpoint: api/auth

media_folder: public/images
public_folder: /images

collections:
  - name: "life-insurance"
    label: "Life Insurance"
    folder: "content/life-insurance"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Author", name: "author", widget: "string", default: "FFRecipe Team" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Last Modified", name: "lastModified", widget: "datetime" }
      - { label: "Tags", name: "tags", widget: "list", default: ["life insurance"] }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "health-insurance"
    label: "Health Insurance"
    folder: "content/health-insurance"
